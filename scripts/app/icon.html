<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; width: 1024px; height: 1024px; background: transparent; }
  .squircle {
    position: absolute; inset: 100px; border-radius: 185px;
    background: radial-gradient(120% 120% at 30% 20%, #2B2724 0%, #191614 62%, #100E0C 100%);
    box-shadow: inset 0 -6px 22px rgba(0,0,0,.55), inset 0 4px 10px rgba(255,255,255,.06);
    overflow: hidden;
  }
  svg { position: absolute; inset: 0; }
</style>
</head>
<body>
  <div class="squircle">
    <svg viewBox="0 0 824 824" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#34D399" stop-opacity=".25"/>
          <stop offset=".55" stop-color="#34D399"/>
          <stop offset="1" stop-color="#A7F3D0"/>
        </linearGradient>
        <radialGradient id="glow" cx=".5" cy=".5" r=".5">
          <stop offset="0" stop-color="#34D399" stop-opacity=".5"/>
          <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- 雷达同心环 -->
      <g fill="none" stroke="#57534E" stroke-opacity=".55">
        <circle cx="412" cy="412" r="132" stroke-width="3"/>
        <circle cx="412" cy="412" r="222" stroke-width="3"/>
        <circle cx="412" cy="412" r="312" stroke-width="3" stroke-dasharray="2 14" stroke-linecap="round"/>
      </g>

      <!-- 心跳脉冲线（学习信号） -->
      <path d="M 92 412 H 268 L 322 412 L 366 300 L 428 540 L 478 356 L 512 412 H 732"
            fill="none" stroke="url(#pulse)" stroke-width="34"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 信号点 -->
      <circle cx="620" cy="252" r="66" fill="url(#glow)"/>
      <circle cx="620" cy="252" r="26" fill="#A7F3D0"/>
    </svg>
  </div>
</body>
</html>
