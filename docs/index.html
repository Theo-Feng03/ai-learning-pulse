<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Learning Pulse｜个人 AI 学习雷达</title>
<style>
  :root {
    --bg: #fafaf9; --fg: #1c1917; --muted: #78716c; --faint: #a8a29e;
    --card: #ffffff; --border: #e7e5e4; --accent: #059669; --ai: #0369a1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1917; --fg: #fafaf9; --muted: #a8a29e; --faint: #78716c;
      --card: #292524; --border: #44403c; --accent: #34d399; --ai: #7dd3fc;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 16px 64px; }
  h1 { font-size: 1.5rem; margin: 0; }
  .sub { color: var(--muted); font-size: .9rem; margin-top: 4px; }
  .note {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: .8rem; color: var(--muted); margin-top: 12px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-top: 16px;
  }
  .card h2 { font-size: .95rem; margin: 0 0 12px; color: var(--muted); font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat .label { font-size: .75rem; color: var(--muted); }
  .stat .value { font-size: 1.6rem; font-weight: 700; }
  .heatmap { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px); gap: 3px; overflow-x: auto; padding-bottom: 4px; }
  .cell { width: 12px; height: 12px; border-radius: 2px; background: var(--border); }
  .c1 { background: #a7f3d0; } .c2 { background: #34d399; } .c3 { background: #059669; }
  .heat-note { font-size: .75rem; color: var(--faint); margin-top: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: .75rem; padding: 2px 10px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  }
  .chip.link { text-decoration: none; }
  .entry { border-top: 1px solid var(--border); padding: 14px 0; }
  .entry:first-of-type { border-top: none; padding-top: 0; }
  .entry h3 { font-size: 1rem; margin: 0; }
  .entry h3 a { color: var(--fg); text-decoration: none; }
  .entry h3 a:hover { text-decoration: underline; }
  .meta { font-size: .75rem; color: var(--faint); margin: 4px 0 0; }
  .ai-summary { font-size: .85rem; color: var(--muted); margin: 8px 0 0; }
  .takeaway { font-size: .9rem; margin: 8px 0 0; }
  .tag { font-size: .7rem; font-weight: 600; border-radius: 4px; padding: 1px 6px; margin-right: 6px; }
  .tag.ai { color: var(--ai); background: color-mix(in srgb, var(--ai) 12%, transparent); }
  .tag.me { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .footer { margin-top: 24px; font-size: .75rem; color: var(--faint); }
  .footer a { color: inherit; }
  .empty { color: var(--muted); font-size: .9rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="product-name">AI Learning Pulse</h1>
    <p class="sub" id="product-desc">个人 AI 学习雷达</p>
    <p class="sub" id="updated"></p>
    <p class="note">本页面只统计本人确认发布的学习记录；自动抓取的资讯数量不计入学习成果。AI 摘要与本人结论分开标注。</p>
  </header>

  <div class="stats" id="stats"></div>

  <section class="card">
    <h2>最近 90 天学习热力图</h2>
    <div class="heatmap" id="heatmap" role="img"></div>
    <p class="heat-note" id="heat-note"></p>
  </section>

  <section class="card" id="topics-card" hidden>
    <h2>当前关注主题（最近 90 天）</h2>
    <div class="chips" id="topics"></div>
  </section>

  <section class="card">
    <h2 id="entries-title">最近学习记录</h2>
    <div id="entries"></div>
  </section>

  <p class="footer">
    由 <a id="gh-link" href="#">AI Learning Pulse</a> 生成 —— 本地采集资讯，AI 辅助理解，本人确认后才进入这份公开学习轨迹。
  </p>
</div>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  const day = (s) => s ? new Date(s).toLocaleDateString("zh-CN") : "";

  let data;
  try {
    const res = await fetch("./showcase.json", { cache: "no-store" });
    data = await res.json();
  } catch {
    $("entries").innerHTML = '<p class="empty">showcase.json 加载失败。</p>';
    return;
  }

  $("product-name").textContent = data.profile.productName;
  $("product-desc").textContent = data.profile.description;
  $("updated").textContent = "最近更新：" + new Date(data.generatedAt).toLocaleString("zh-CN");
  if (data.profile.githubUrl) $("gh-link").href = data.profile.githubUrl;

  const statDefs = [
    ["90 天学习记录", data.stats.records90d],
    ["12 周活跃周", data.stats.activeWeeks12],
    ["关注主题数", data.stats.topicCount90d],
    ["学习到实践", data.stats.linkedPracticeCount],
  ];
  $("stats").innerHTML = statDefs.map(([label, value]) =>
    `<div class="stat"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`
  ).join("");

  const recent = data.heatmap.slice(-90);
  const total = recent.reduce((sum, d) => sum + d.count, 0);
  const active = recent.filter((d) => d.count > 0).length;
  $("heatmap").innerHTML = recent.map((d) => {
    const cls = d.count === 0 ? "" : d.count === 1 ? " c1" : d.count === 2 ? " c2" : " c3";
    return `<div class="cell${cls}" title="${esc(d.date)}：${d.count} 条已发布学习记录"></div>`;
  }).join("");
  $("heatmap").setAttribute("aria-label", `最近 90 天共 ${total} 条已发布记录，${active} 个活跃日`);
  $("heat-note").textContent = `最近 90 天：${total} 条已发布记录，${active} 个活跃日`;

  if (data.topics.length > 0) {
    $("topics-card").hidden = false;
    $("topics").innerHTML = data.topics.map((t) =>
      `<span class="chip">${esc(t.name)} × ${t.count}</span>`).join("");
  }

  $("entries-title").textContent = `最近学习记录（${data.entries.length}）`;
  if (data.entries.length === 0) {
    $("entries").innerHTML = '<p class="empty">还没有已发布的学习记录。</p>';
    return;
  }
  $("entries").innerHTML = data.entries.map((e) => `
    <article class="entry">
      <h3><a href="${esc(e.sourceUrl)}" target="_blank" rel="noreferrer">${esc(e.title)} ↗</a></h3>
      <p class="meta">${esc(e.sourceName)}${e.sourcePublishedAt ? "｜原文 " + day(e.sourcePublishedAt) : ""}｜学习于 ${day(e.publishedAt)}</p>
      ${e.summaryZh ? `<p class="ai-summary"><span class="tag ai">AI 摘要</span>${esc(e.summaryZh)}</p>` : ""}
      <p class="takeaway"><span class="tag me">我的学习结论</span>${esc(e.userTakeaway)}</p>
      ${e.whyFollow ? `<p class="ai-summary">为什么关注：${esc(e.whyFollow)}</p>` : ""}
      <p style="margin:8px 0 0" class="chips">
        ${e.topics.map((t) => `<span class="chip">${esc(t)}</span>`).join("")}
        ${e.projectLinks.map((l) =>
          `<a class="chip link" href="${esc(l.projectUrl)}" target="_blank" rel="noreferrer">实践：${esc(l.projectName)} ↗</a>`).join("")}
      </p>
    </article>`).join("");
})();
</script>
</body>
</html>
